<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      /**
       * Polyfill and fix for "Cannot set property fetch of #<Window> which has only a getter"
       * This occurs in some iframe environments where window.fetch is a read-only getter.
       */
      (function() {
        try {
          // 1. Force 'global' and 'self' to window to prevent some polyfills from failing
          window.global = window;
          
          var originalFetch = window.fetch;
          if (!originalFetch) return;

          function createSafeFetchDescriptor(value) {
            return {
              get: function() { return value; },
              set: function(v) { 
                console.warn("Intercepted fetch overwrite attempt. Keeping original fetch.");
              },
              configurable: true,
              enumerable: true
            };
          }

          // 2. Attempt to redefine on the instance
          try {
            Object.defineProperty(window, 'fetch', createSafeFetchDescriptor(originalFetch));
          } catch (e1) {
            // 3. If instance fails, try to handle it via the prototype if possible
            try {
              var proto = Object.getPrototypeOf(window);
              if (proto) {
                var desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
                if (desc && desc.configurable) {
                  Object.defineProperty(proto, 'fetch', createSafeFetchDescriptor(originalFetch));
                }
              }
            } catch (e2) {
              console.error("Critical: Could not shim fetch setter in this environment.", e1, e2);
            }
          }
          
          // 4. Handle 'process' if it's being accessed by a client-side library
          if (typeof window.process === 'undefined') {
            window.process = { env: {}, nextTick: function(fn) { setTimeout(fn, 0); } };
          }
        } catch (err) {
          console.warn("Fetch safety script partially failed:", err);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
